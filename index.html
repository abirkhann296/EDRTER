<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>LinkCraft | Premium URL Shortener</title>
    <meta property="og:title" content="LinkCraft - Premium Short Link">
    <meta property="og:description" content="Click to open the securely shortened premium link via LinkCraft Analytics.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1563986768609-322da13575f3?w=500"> 
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ⚠️ আপনার Firebase কনফিগারেশন এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyBz3jsTZ6HNFELvc_p-7HTvEmShXHR86zA",
            authDomain: "my-shortner-35bfc.firebaseapp.com",
            databaseURL: "https://my-shortner-35bfc-default-rtdb.firebaseio.com",
            projectId: "my-shortner-35bfc",
            storageBucket: "my-shortner-35bfc.firebasestorage.app",
            messagingSenderId: "317704005542",
            appId: "1:317704005542:web:bea2eb9b8b1e42f1899167"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ADMIN_USERNAME = "admin"; 
        const ADMIN_PASSWORD = "admin"; 

        // ⚡ [সুপারফাস্ট জিরো-ডিле রিডাইরেকশন এবং সঠিক কাউন্টিং]
        const urlParams = new URLSearchParams(window.location.search);
        const shortCode = urlParams.get('go');
        
        if (shortCode) {
            database.ref('links/' + shortCode).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // ১. সাথে সাথে ইউজারকে রিডাইরেক্ট (জিরো লেটেন্সি)
                    window.location.replace(data.originalUrl);
                    
                    // ২. 🔥 [মোস্ট ইম্পর্ট্যান্ট] সার্ভার লেভেলে এটমিক ইনক্রিমেন্ট - ১টি ক্লিকও মিস হবে না
                    database.ref('links/' + shortCode).update({
                        clicks: firebase.database.ServerValue.increment(1)
                    });
                } else {
                    alert("লিংকটি পাওয়া যায়নি!");
                    window.location.href = window.location.pathname;
                }
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        #mainDashboard, #loginScreen { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen relative">

    <div id="toastBox" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        if (!shortCode) {
            window.addEventListener('DOMContentLoaded', () => {
                checkLoginStatus();
            });
        }

        // 🎯 কাস্টম সুন্দর নোটিফিকেশন ফাংশন (অ্যালার্টের বিকল্প)
        function showToast(message, type = 'success') {
            const toastBox = document.getElementById('toastBox');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-emerald-500 border-emerald-400' : 'bg-red-500 border-red-400';
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';

            toast.className = `flex items-center gap-3 ${bgColor} text-white px-5 py-3 rounded-xl shadow-xl border font-medium text-sm transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-auto`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-base"></i> <span>${message}</span>`;
            
            toastBox.appendChild(toast);

            // অ্যানিমেশন ইফেক্ট
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            // ৩ সেকেন্ড পর স্বয়ংক্রিয়ভাবে মুছে যাওয়া
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3000);
        }

        function checkLoginStatus() {
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                document.getElementById('mainDashboard').style.display = 'block';
                loadDashboardData();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                sessionStorage.setItem("isLoggedIn", "true");
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                loadDashboardData();
                showToast("লগইন সফল হয়েছে!");
            } else {
                showToast("ভুল ইউজারনেম অথবা পাসওয়ার্ড!", "error");
            }
        }

        function timeAgo(timestamp) {
            if (!timestamp) return 'N/A';
            const now = Date.now();
            const seconds = Math.floor((now - timestamp) / 1000);
            
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 30) return `${days}d ago`;
            
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
    </script>

    <div id="loginScreen" class="fixed inset-0 items-center justify-center bg-slate-950 px-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                <i class="fa-solid fa-lock-open mr-2"></i>Admin Login
            </h2>
            <p class="text-slate-400 text-sm mb-6">ড্যাশবোর্ডে প্রবেশ করতে লগইন করুন।</p>
            <form onsubmit="handleLogin(event)" class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">ইউজারনেম</label>
                    <input type="text" id="usernameInput" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">পাসওয়ার্ড</label>
                    <input type="password" id="passwordInput" required class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <button type="submit" class="w-full mt-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-lg shadow-cyan-500/20">
                    লগইন করুন
                </button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center sm:text-left">
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                    <i class="fa-solid fa-link mr-2"></i>LinkCraft Shortner
                </h1>
                <p class="text-slate-400 text-sm">আপনার লিংক শর্ট করুন, ট্র্যাক করুন এবং যেকোনো সময় এডিট করুন।</p>
            </div>
            <button onclick="sessionStorage.clear(); window.location.reload();" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-4 py-2 rounded-xl transition font-medium text-sm">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>লগআউট
            </button>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 mb-8">
            <h2 class="text-xl font-bold mb-4 text-cyan-400"><i class="fa-solid fa-plus-circle mr-2"></i>নতুন শর্ট লিংক তৈরি করুন</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="url" id="longUrl" placeholder="মূল লিংকটি এখানে দিন (https://...)" class="md:col-span-2 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400">
                <input type="text" id="customCode" placeholder="কাস্টম নাম/কোড (ঐচ্ছিক)" class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400">
            </div>
            <button onclick="createShortLink()" class="mt-4 w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-lg shadow-cyan-500/20">
                লিংক শর্ট করুন
            </button>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-emerald-400"><i class="fa-solid fa-list-ol mr-2"></i>আপনার তৈরি করা লিংকসমূহ</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 text-sm">
                            <th class="pb-3 text-center w-12">#</th>
                            <th class="pb-3">শর্ট লিংক</th>
                            <th class="pb-3">টার্げて লিংক (Original)</th>
                            <th class="pb-3">তৈরির সময়</th>
                            <th class="pb-3 text-center">ক্লিক সংখ্যা</th>
                            <th class="pb-3 text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="linksTable" class="divide-y divide-slate-700/50 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.href.split('?')[0];

        function createShortLink() {
            const longUrl = document.getElementById('longUrl').value.trim();
            let customCode = document.getElementById('customCode').value.trim().toLowerCase();

            if (!longUrl) return showToast("দয়া করে একটি সঠিক ইউআরএল (URL) দিন।", "error");
            if (!customCode) customCode = Math.random().toString(36).substring(2, 7);

            database.ref('links/' + customCode).set({
                originalUrl: longUrl,
                clicks: 0,
                createdAt: Date.now()
            }).then(() => {
                document.getElementById('longUrl').value = '';
                document.getElementById('customCode').value = '';
                showToast("লিংক সফলভাবে তৈরি হয়েছে!");
            });
        }

        function loadDashboardData() {
            database.ref('links').on('value', (snapshot) => {
                const tableBody = document.getElementById('linksTable');
                tableBody.innerHTML = '';

                if (!snapshot.exists()) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-slate-500">কোনো লিংক পাওয়া যায়নি!</td></tr>`;
                    return;
                }

                let linksArray = [];
                snapshot.forEach((childSnapshot) => {
                    linksArray.push({
                        code: childSnapshot.key,
                        originalUrl: childSnapshot.val().originalUrl,
                        clicks: childSnapshot.val().clicks || 0,
                        createdAt: childSnapshot.val().createdAt || null
                    });
                });

                linksArray.sort((a, b) => b.createdAt - a.createdAt);

                let index = 1;
                linksArray.forEach((data) => {
                    const shortLink = `${baseUrl}?go=${data.code}`;
                    const timeDisplay = timeAgo(data.createdAt);

                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-700/30 transition">
                            <td class="py-4 text-center font-bold text-slate-500">${index++}</td>
                            <td class="py-4 font-semibold text-cyan-400">
                                <a href="${shortLink}" target="_blank" class="hover:underline">${data.code}</a>
                                <button onclick="navigator.clipboard.writeText('${shortLink}'); showToast('লিংক কপি হয়েছে!')" class="ml-2 text-slate-400 hover:text-white cursor-pointer" title="Copy"><i class="fa-regular fa-copy"></i></button>
                            </td>
                            <td class="py-4 max-w-xs truncate text-slate-300" title="${data.originalUrl}">${data.originalUrl}</td>
                            <td class="py-4 text-slate-400 text-xs font-medium"><i class="fa-regular fa-clock mr-1 text-slate-500"></i>${timeDisplay}</td>
                            <td class="py-4 text-center">
                                <span class="bg-slate-900 px-3 py-1 rounded-full text-emerald-400 font-bold border border-emerald-500/20 shadow-inner">
                                    <i class="fa-solid fa-chart-simple text-xs mr-1"></i> ${data.clicks}
                                </span>
                            </td>
                            <td class="py-4 text-center">
                                <button onclick="editLink('${data.code}', '${data.originalUrl}')" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white px-3 py-1 rounded-lg mr-1 transition cursor-pointer"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteLink('${data.code}')" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-3 py-1 rounded-lg transition cursor-pointer"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function editLink(code, oldUrl) {
            const newUrl = prompt("নতুন টার্গেট লিংকটি দিন:", oldUrl);
            if (newUrl && newUrl.trim() !== "" && newUrl !== oldUrl) {
                database.ref('links/' + code).update({
                    originalUrl: newUrl.trim()
                }).then(() => showToast("লিংক সফলভাবে আপডেট করা হয়েছে!"));
            }
        }

        function deleteLink(code) {
            if (confirm("আপনি কি নিশ্চিতভাবে এই লিংকটি ডিলিট করতে চান?")) {
                database.ref('links/' + code).remove().then(() => showToast("লিংক ডিলিট করা হয়েছে।", "error"));
            }
        }
    </script>
</body>
</html>
