<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium URL Shortener & Analytics</title>
    <!-- Tailwind CSS for Premium UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <!-- Redirect Logic (সবার আগে রান হবে যদি শর্ট লিংক ভিজিট হয়) -->
    <script>
        // ⚠️ আপনার Firebase কনফিগারেশন এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyBz3jsTZ6HNFELvc_p-7HTvEmShXHR86zA",
            authDomain: "my-shortner-35bfc.firebaseapp.com",
            databaseURL: "https://my-shortner-35bfc-default-rtdb.firebaseio.com",
            projectId: "my-shortner-35bfc",
            storageBucket: "my-shortner-35bfc.firebasestorage.app",
            messagingSenderId: "317704005542",
            appId: "1:317704005542:web:bea2eb9b8b1e42f1899167"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // রিডাইরেকশন চেক
        const urlParams = new URLSearchParams(window.location.search);
        const shortCode = urlParams.get('go'); // Example: domain.com/?go=fb
        
        if (shortCode) {
            database.ref('links/' + shortCode).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    // ক্লিক কাউন্ট ১ বাড়ানো (Instant Increment)
                    database.ref('links/' + shortCode).update({
                        clicks: (data.clicks || 0) + 1
                    }).then(() => {
                        window.location.href = data.originalUrl;
                    });
                } else {
                    alert("লিংকটি পাওয়া যায়নি বা ডিলিট করা হয়েছে!");
                    window.location.href = window.location.pathname;
                }
            });
        }
    </script>

    <!-- Main UI (ড্যাশবোর্ড) -->
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                <i class="fa-solid fa-link mr-2"></i>LinkCraft Shortner
            </h1>
            <p class="text-slate-400">আপনার লিংক শর্ট করুন, ট্র্যাক করুন এবং যেকোনো সময় এডিট করুন।</p>
        </header>

        <!-- লিংক তৈরি করার ফর্ম -->
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 mb-8">
            <h2 class="text-xl font-bold mb-4 text-cyan-400"><i class="fa-solid fa-plus-circle mr-2"></i>নতুন শর্ট লিংক তৈরি করুন</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="url" id="longUrl" placeholder="মূল লিংকটি এখানে দিন (https://...)" class="md:col-span-2 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400">
                <input type="text" id="customCode" placeholder="কাস্টম নাম/কোড (ঐচ্ছিক)" class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400">
            </div>
            <button onclick="createShortLink()" class="mt-4 w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-lg shadow-cyan-500/20">
                লিংক শর্ট করুন
            </button>
        </div>

        <!-- শর্ট লিংকের তালিকা -->
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-emerald-400"><i class="fa-solid fa-list-ol mr-2"></i>আপনার তৈরি করা লিংকসমূহ</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 text-sm">
                            <th class="pb-3 text-center w-12">#</th>
                            <th class="pb-3">শর্ট লিংক</th>
                            <th class="pb-3">টার্গেট লিংক (Original)</th>
                            <th class="pb-3 text-center">ক্লিক সংখ্যা</th>
                            <th class="pb-3 text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="linksTable" class="divide-y divide-slate-700/50 text-sm">
                        <!-- ডাটাবেজ থেকে এখানে অটোমেটিক লিংক লোড হবে -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- JavaScript logic for Dashboard -->
    <script>
        const baseUrl = window.location.href.split('?')[0];

        // লিংক জেনারেট করা
        function createShortLink() {
            const longUrl = document.getElementById('longUrl').value.trim();
            let customCode = document.getElementById('customCode').value.trim().toLowerCase();

            if (!longUrl) return alert("দয়া করে একটি সঠিক ইউআরএল (URL) দিন।");
            if (!customCode) customCode = Math.random().toString(36).substring(2, 7); // কোড না দিলে র‍্যান্ডম কোড নেবে

            database.ref('links/' + customCode).set({
                originalUrl: longUrl,
                clicks: 0,
                createdAt: Date.now()
            }).then(() => {
                document.getElementById('longUrl').value = '';
                document.getElementById('customCode').value = '';
                alert("লিংক সফলভাবে তৈরি হয়েছে!");
            });
        }

        // রিয়েলটাইম ডাটা টেবিলে দেখানো (Live Update)
        database.ref('links').on('value', (snapshot) => {
            const tableBody = document.getElementById('linksTable');
            tableBody.innerHTML = '';
            let index = 1;

            if (!snapshot.exists()) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-slate-500">কোনো লিংক পাওয়া যায়নি!</td></tr>`;
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const code = childSnapshot.key;
                const data = childSnapshot.val();
                const shortLink = `${baseUrl}?go=${code}`;

                tableBody.innerHTML += `
                    <tr class="hover:bg-slate-700/30 transition">
                        <td class="py-4 text-center font-bold text-slate-500">${index++}</td>
                        <td class="py-4 font-semibold text-cyan-400">
                            <a href="${shortLink}" target="_blank" class="hover:underline">${code}</a>
                            <button onclick="navigator.clipboard.writeText('${shortLink}'); alert('কপি হয়েছে!')" class="ml-2 text-slate-400 hover:text-white" title="Copy"><i class="fa-regular fa-copy"></i></button>
                        </td>
                        <td class="py-4 max-w-xs truncate text-slate-300" title="${data.originalUrl}">${data.originalUrl}</td>
                        <td class="py-4 text-center">
                            <span class="bg-slate-900 px-3 py-1 rounded-full text-emerald-400 font-bold border border-emerald-500/20 shadow-inner">
                                <i class="fa-solid fa-chart-simple text-xs mr-1"></i> ${data.clicks || 0}
                            </span>
                        </td>
                        <td class="py-4 text-center">
                            <button onclick="editLink('${code}', '${data.originalUrl}')" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white px-3 py-1 rounded-lg mr-1 transition"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteLink('${code}')" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-3 py-1 rounded-lg transition"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        });

        // লিংক এডিট করা (Inline Update)
        function editLink(code, oldUrl) {
            const newUrl = prompt("নতুন টার্গেট লিংকটি দিন:", oldUrl);
            if (newUrl && newUrl.trim() !== "" && newUrl !== oldUrl) {
                database.ref('links/' + code).update({
                    originalUrl: newUrl.trim()
                }).then(() => alert("লিংক আপডেট করা হয়েছে!"));
            }
        }

        // লিংক ডিলিট করা
        function deleteLink(code) {
            if (confirm("আপনি কি নিশ্চিতভাবে এই লিংকটি ডিলিট করতে চান?")) {
                database.ref('links/' + code).remove().then(() => alert("লিংক ডিলিট হয়েছে।"));
            }
        }
    </script>
</body>
</html>
