<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkCraft Pro | Analytics & Shortener</title>
    
    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        // ⚠️ আপনার Firebase কনফিগারেশন এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyBz3jsTZ6HNFELvc_p-7HTvEmShXHR86zA",
            authDomain: "my-shortner-35bfc.firebaseapp.com",
            databaseURL: "https://my-shortner-35bfc-default-rtdb.firebaseio.com",
            projectId: "my-shortner-35bfc",
            storageBucket: "my-shortner-35bfc.firebasestorage.app",
            messagingSenderId: "317704005542",
            appId: "1:317704005542:web:bea2eb9b8b1e42f1899167"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ⚡ রিডাইরেকশন লজিক (নিখুঁত)
        const urlParams = new URLSearchParams(window.location.search);
        const go = urlParams.get('go');
        
        if (go) {
            database.ref('links/' + go).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    // আপডেট ক্লিক ও অ্যানালিটিক্স
                    database.ref('links/' + go + '/clicks').transaction(c => (c || 0) + 1);
                    window.location.replace(data.originalUrl);
                }
            });
        }
    </script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <div id="app" class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-cyan-400 mb-8 flex items-center gap-3">
            <i class="fa-solid fa-link"></i> LinkCraft Pro
        </h1>

        <!-- Shorten Form -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="url" id="longUrl" placeholder="Enter long URL..." class="flex-1 bg-slate-950 p-3 rounded-xl border border-slate-700 outline-none focus:border-cyan-500">
                <input type="text" id="customCode" placeholder="Custom Code (Optional)" class="w-full md:w-48 bg-slate-950 p-3 rounded-xl border border-slate-700 outline-none focus:border-cyan-500">
                <button onclick="saveLink()" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-3 rounded-xl font-bold transition">Shorten</button>
            </div>
        </div>

        <!-- Links Table -->
        <div id="linksContainer" class="space-y-4"></div>
    </div>

    <script>
        function saveLink() {
            const url = document.getElementById('longUrl').value;
            let code = document.getElementById('customCode').value || Math.random().toString(36).substring(7);
            
            if(!url) return alert("Enter a valid URL!");

            database.ref('links/' + code).set({
                originalUrl: url,
                clicks: 0,
                createdAt: Date.now()
            }).then(() => {
                alert("Success!");
                document.getElementById('longUrl').value = '';
            }).catch(e => alert("Error: " + e.message));
        }

        // লোড লিংকস
        database.ref('links').on('value', snapshot => {
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';
            snapshot.forEach(child => {
                const data = child.val();
                const code = child.key;
                const shortUrl = window.location.origin + window.location.pathname + '?go=' + code;
                
                container.innerHTML += `
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-cyan-300">${shortUrl}</p>
                            <p class="text-xs text-slate-500">Clicks: ${data.clicks || 0}</p>
                        </div>
                        <button onclick="navigator.clipboard.writeText('${shortUrl}'); alert('Copied!')" class="bg-slate-800 p-2 rounded-lg hover:bg-slate-700">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
