    <script>
        // ⚠️ আপনার Firebase কনফিগারেশন এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyBz3jsTZ6HNFELvc_p-7HTvEmShXHR86zA",
            authDomain: "my-shortner-35bfc.firebaseapp.com",
            databaseURL: "https://my-shortner-35bfc-default-rtdb.firebaseio.com",
            projectId: "my-shortner-35bfc",
            storageBucket: "my-shortner-35bfc.firebasestorage.app",
            messagingSenderId: "317704005542",
            appId: "1:317704005542:web:bea2eb9b8b1e42f1899167"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ADMIN_USERNAME = "admin"; 
        const ADMIN_PASSWORD = "admin"; 

        // ⚡ [অ্যাডভান্সড ট্র্যাকিং, ট্রানজেকশন কাউন্টিং এবং রিডাইরেকশন লজিক]
        const urlParams = new URLSearchParams(window.location.search);
        const shortCode = urlParams.get('go');
        
        if (shortCode) {
            const linkRef = database.ref('links/' + shortCode);
            
            linkRef.once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const originalUrl = snapshot.val().originalUrl;
                    
                    // 📊 ডিভাইস ও ট্রাফিক সোর্স ডিটেকশন
                    const userAgent = navigator.userAgent.toLowerCase();
                    let device = "Desktop";
                    if (/mobile|android|iphone|ipad|phone/i.test(userAgent)) device = "Mobile";
                    
                    let source = "Direct / Organic";
                    if (document.referrer) {
                        const ref = document.referrer.toLowerCase();
                        if (ref.includes("facebook.com") || ref.includes("fb.me")) source = "Facebook";
                        else if (ref.includes("instagram.com")) source = "Instagram";
                        else if (ref.includes("whatsapp.com")) source = "WhatsApp";
                        else if (ref.includes("youtube.com")) source = "YouTube";
                        else if (ref.includes("t.me") || ref.includes("telegram")) source = "Telegram";
                        else {
                            try { source = new URL(document.referrer).hostname; } catch(e){}
                        }
                    } else {
                        // ফেসবুক ইন-অ্যাপ ব্রাউজার বা মেসেঞ্জার ট্র্যাকিং ব্যাকআপ
                        if (userAgent.includes("fbav") || userAgent.includes("fb_iab")) source = "Facebook App";
                    }

                    // 🔥 ট্রানজেকশন ও অ্যানালিটিক্স সেভ লজিক
                    linkRef.transaction((currentData) => {
                        if (currentData) {
                            currentData.clicks = (currentData.clicks || 0) + 1;
                            
                            if (!currentData.analytics) currentData.analytics = {};
                            if (!currentData.analytics.devices) currentData.analytics.devices = {};
                            if (!currentData.analytics.sources) currentData.analytics.sources = {};
                            
                            currentData.analytics.devices[device] = (currentData.analytics.devices[device] || 0) + 1;
                            currentData.analytics.sources[source] = (currentData.analytics.sources[source] || 0) + 1;
                        }
                        return currentData;
                    }, (error, committed, snapshot) => {
                        window.location.replace(originalUrl);
                    });
                } else {
                    alert("লিংকটি পাওয়া যায়নি!");
                    window.location.href = window.location.pathname;
                }
            }).catch(() => {
                window.location.replace(window.location.pathname);
            });
        }
    </script>

    <!-- 🔔 ডানপাশের আধুনিক টোস্ট নোটিফিকেশন বক্স -->
    <div id="toastBox" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // ডার্ক/লাইট মোড টগল লজিক
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeBtnIcon');
            if (body.classList.contains('dark-mode')) {
                body.classList.replace('dark-mode', 'light-mode');
                themeBtn.className = "fa-solid fa-moon text-lg";
                localStorage.setItem("theme", "light");
            } else {
                body.classList.replace('light-mode', 'dark-mode');
                themeBtn.className = "fa-solid fa-sun text-lg";
                localStorage.setItem("theme", "dark");
            }
        }

        if (!shortCode) {
            window.addEventListener('DOMContentLoaded', () => {
                if (localStorage.getItem("theme") === "light") toggleTheme();
                checkLoginStatus();
            });
        }

        function showToast(message, type = 'success') {
            const toastBox = document.getElementById('toastBox');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';

            toast.className = `flex items-center gap-3 ${bgColor} text-white px-5 py-3 rounded-xl shadow-xl font-medium text-sm transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-auto`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-base"></i> <span>${message}</span>`;
            
            toastBox.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3000);
        }

        function checkLoginStatus() {
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                document.getElementById('mainDashboard').style.display = 'block';
                loadDashboardData();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                sessionStorage.setItem("isLoggedIn", "true");
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                loadDashboardData();
                showToast("লগইন সফল হয়েছে!");
            } else {
                showToast("ভুল ইউজারনেম অথবা পাসওয়ার্ড!", "error");
            }
        }

        function timeAgo(timestamp) {
            if (!timestamp) return 'N/A';
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }
    </script>

    <script>
        const baseUrl = window.location.href.split('?')[0];
        let allLinks = [];
        let qrCodeInstance = null;

        function createShortLink() {
            const longUrl = document.getElementById('longUrl').value.trim();
            let customCode = document.getElementById('customCode').value.trim().toLowerCase();

            if (!longUrl) return showToast("দয়া করে একটি সঠিক ইউআরএল (URL) দিন।", "error");
            if (!customCode) customCode = Math.random().toString(36).substring(2, 7);

            database.ref('links/' + customCode).set({
                originalUrl: longUrl,
                clicks: 0,
                createdAt: Date.now(),
                analytics: { devices: { Desktop: 0, Mobile: 0 }, sources: { "Direct / Organic": 0 } }
            }).then(() => {
                document.getElementById('longUrl').value = '';
                document.getElementById('customCode').value = '';
                showToast("লিংক সফলভাবে তৈরি হয়েছে!");
            });
        }

        function loadDashboardData() {
            database.ref('links').on('value', (snapshot) => {
                allLinks = [];
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        allLinks.push({
                            code: childSnapshot.key,
                            ...childSnapshot.val()
                        });
                    });
                    allLinks.sort((a, b) => b.createdAt - a.createdAt);
                }
                renderLinks(allLinks);
            });
        }

        function renderLinks(links) {
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';

            if (links.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-500 card border rounded-2xl">কোনো লিংক পাওয়া যায়নি!</div>`;
                return;
            }

            links.forEach((data) => {
                const shortLink = `${baseUrl}?go=${data.code}`;
                
                container.innerHTML += `
                    <div class="card border p-5 rounded-2xl shadow-md flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:shadow-lg transition">
                        <div class="space-y-1 max-w-xl w-full">
                            <div class="flex items-center gap-2">
                                <span class="bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-lg text-sm font-bold border border-cyan-500/20">${data.code}</span>
                                <p class="text-xs text-slate-400 font-medium"><i class="fa-regular fa-clock mr-1"></i>${timeAgo(data.createdAt)}</p>
                            </div>
                            <p class="text-xs text-slate-400 truncate mt-1">Original: <a href="${data.originalUrl}" target="_blank" class="hover:underline text-slate-300">${data.originalUrl}</a></p>
                        </div>
                        
                        <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-end border-t md:border-none pt-3 md:pt-0">
                            <div class="text-center bg-slate-950/40 px-4 py-2 rounded-xl border border-slate-800">
                                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Clicks</p>
                                <p class="text-lg font-black text-emerald-400">${data.clicks || 0}</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="copyToClipboard('${shortLink}', this)" class="bg-slate-700/30 hover:bg-slate-700 text-slate-300 p-3 rounded-xl transition cursor-pointer" title="Copy URL"><i class="fa-regular fa-copy"></i></button>
                                <button onclick="openAnalyticsModal('${data.code}')" class="bg-amber-600/20 hover:bg-amber-600 text-amber-400 hover:text-white p-3 rounded-xl transition cursor-pointer" title="QR & Analytics"><i class="fa-solid fa-chart-pie"></i></button>
                                <button onclick="editLink('${data.code}', '${data.originalUrl}')" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white p-3 rounded-xl transition cursor-pointer" title="Edit Link"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteLink('${data.code}')" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white p-3 rounded-xl transition cursor-pointer" title="Delete Link"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 🎯 স্মার্ট কপি বাটন অ্যানিমেশন
        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('লিংক কপি হয়েছে!');
                const icon = btnElement.querySelector('i');
                icon.className = "fa-solid fa-check text-emerald-400";
                setTimeout(() => {
                    icon.className = "fa-regular fa-copy";
                }, 2000);
            });
        }

        // 🔍 লাইভ ফিল্টার এবং সার্চ লজিক
        function filterLinks() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = allLinks.filter(link => 
                link.code.includes(query) || link.originalUrl.toLowerCase().includes(query)
            );
            renderLinks(filtered);
        }

        // 📊 অ্যানালিটিক্স এবং QR মডাল কন্ট্রোল
        function openAnalyticsModal(code) {
            const linkData = allLinks.find(l => l.code === code);
            if (!linkData) return;

            document.getElementById('modalTitle').innerText = `লিংক অ্যানালিটিক্স (${code})`;
            const shortLink = `${baseUrl}?go=${code}`;

            // QR Code জেনারেট করা
            document.getElementById('qrcode').innerHTML = '';
            qrCodeInstance = new QRCode(document.getElementById('qrcode'), {
                text: shortLink,
                width: 160,
                height: 160,
                colorDark: "#0f172a",
                colorLight: "#ffffff"
            });

            // QR ডাউনলোড বাটন হ্যান্ডলার সেট করা
            document.getElementById('downloadQRBtn').onclick = function() {
                const qrImg = document.querySelector('#qrcode img');
                if (qrImg) {
                    const a = document.createElement('a');
                    a.href = qrImg.src;
                    a.download = `qrcode-${code}.png`;
                    a.click();
                } else {
                    showToast("দয়া করে QR ইমেজ জেনারেট হওয়া পর্যন্ত একটু অপেক্ষা করুন।", "error");
                }
            };

            // ডিভাইস পরিসংখ্যান প্রিন্ট করা
            const devContainer = document.getElementById('deviceStats');
            devContainer.innerHTML = '';
            const devices = linkData.analytics?.devices || {};
            if (Object.keys(devices).length === 0) devContainer.innerText = "কোনো ডেটা নেই।";
            for (let dev in devices) {
                devContainer.innerHTML += `<div class="flex justify-between text-xs border-b border-slate-800 py-1"><span>${dev}</span><span class="font-bold text-cyan-400">${devices[dev]}টি ক্লিক</span></div>`;
            }

            // সোর্স পরিসংখ্যান প্রিন্ট করা
            const srcContainer = document.getElementById('sourceStats');
            srcContainer.innerHTML = '';
            const sources = linkData.analytics?.sources || {};
            if (Object.keys(sources).length === 0) srcContainer.innerText = "কোনো ডেটা নেই।";
            for (let src in sources) {
                srcContainer.innerHTML += `<div class="flex justify-between text-xs border-b border-slate-800 py-1"><span class="capitalize">${src}</span><span class="font-bold text-purple-400">${sources[src]}টি ক্লিক</span></div>`;
            }

            const modal = document.getElementById('infoModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.remove('hidden'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.add('hidden');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function editLink(code, oldUrl) {
            const newUrl = prompt("নতুন টার্গেট লিংকটি দিন:", oldUrl);
            if (newUrl && newUrl.trim() !== "" && newUrl !== oldUrl) {
                database.ref('links/' + code).update({ originalUrl: newUrl.trim() })
                .then(() => showToast("লিংক সফলভাবে আপডেট করা হয়েছে!"));
            }
        }

        function deleteLink(code) {
            if (confirm("আপনি কি নিশ্চিতভাবে এই লিংকটি ডিলিট করতে চান?")) {
                database.ref('links/' + code).remove()
                .then(() => showToast("লিংক ডিলিট করা হয়েছে।", "error"));
            }
        }
    </script>
</body>
</html>
